name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ubereats_api_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb -uroot -proot -e 'SELECT 1' >/dev/null 2>&1 || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: mysql://root:${{ secrets.MARIADB_ROOT_PASSWORD }}@127.0.0.1:3306/ubereats_api_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ACCESS_EXPIRES_IN: 30m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      CORS_CREDENTIALS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for DB
        run: |
          for i in {1..60}; do
            if mariadb -h127.0.0.1 -uroot -proot -e "SELECT 1" >/dev/null 2>&1; then
              echo "MariaDB is ready"
              exit 0
            fi
            echo "Waiting for MariaDB..."
            sleep 2
          done
          echo "MariaDB did not become ready in time"
          exit 1

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Build Docker image
        run: docker build -t ubereats-api:ci .

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/ubereats-api"
          SHA_TAG="${GITHUB_SHA}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${SHA_TAG}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA_TAG}"
